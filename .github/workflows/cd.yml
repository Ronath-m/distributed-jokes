# CD: build/push images and redeploy app VMs. Uses a self-hosted runner on the submit VM
# with Azure Managed Identity (no AZURE_CREDENTIALS / app registration needed).
name: cd-azure

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    # Run on the self-hosted runner you install on the submit VM (label: azure).
    runs-on: [ self-hosted, azure ]
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push moderate image
        run: |
          IMAGE_PREFIX=ghcr.io/$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')/distributed-jokes
          docker build -t $IMAGE_PREFIX-moderate:latest services/moderate
          docker push $IMAGE_PREFIX-moderate:latest

      - name: Azure login (Managed Identity)
        run: |
          az login --identity
          if [ -n "${{ secrets.AZURE_SUBSCRIPTION_ID }}" ]; then
            az account set --subscription "${{ secrets.AZURE_SUBSCRIPTION_ID }}"
          fi

      - name: Trigger redeploy on app VMs (15 min timeout per VM)
        run: |
          set +e
          # 15 min timeout per VM so we never hang (az run-command can take 90 min otherwise).
          TIMEOUT=900
          run_one() {
            local label=$1 vm=$2 script=$3 out=$4
            echo "=== $label ==="
            timeout $TIMEOUT az vm run-command invoke -g jokes-rg -n "$vm" --command-id RunShellScript --scripts "$script"
            echo $? > "$out"
          }
          MOD_SCRIPT='cd /home/azureuser/app && git pull || true && cd /home/azureuser/app/deploy/moderate && JOKE_IP=10.1.1.4 RABBITMQ_IP=10.0.1.5 docker compose up -d --build'
          SUB_SCRIPT='cd /home/azureuser/app && git pull || true && cd /home/azureuser/app/deploy/submit && JOKE_IP=10.1.1.4 RABBITMQ_IP=10.0.1.5 docker compose up -d --build'
          JOKE_SCRIPT='cd /home/azureuser/app && git pull && cd /home/azureuser/app/deploy/joke && RABBITMQ_IP=10.0.1.5 docker compose up -d --build'
          (run_one "Moderate VM" "jokes-moderate-vm" "$MOD_SCRIPT" /tmp/moderate.exit) &
          (run_one "Submit VM" "jokes-submit-vm" "$SUB_SCRIPT" /tmp/submit.exit) &
          (run_one "Joke VM" "jokes-joke-vm" "$JOKE_SCRIPT" /tmp/joke.exit) &
          wait
          moderate=$(cat /tmp/moderate.exit); submit=$(cat /tmp/submit.exit); joke=$(cat /tmp/joke.exit)
          echo "Exit codes: joke=$joke moderate=$moderate submit=$submit (124 = timeout)"
          exit $(( joke | moderate | submit ))

