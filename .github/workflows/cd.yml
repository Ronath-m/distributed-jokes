# CD: build/push images and redeploy app VMs. Uses a self-hosted runner on the submit VM
# with Azure Managed Identity (no AZURE_CREDENTIALS / app registration needed).
name: cd-azure

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    # Run on the self-hosted runner you install on the submit VM (label: azure).
    runs-on: [ self-hosted, azure ]
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push moderate image
        run: |
          IMAGE_PREFIX=ghcr.io/$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')/distributed-jokes
          docker build -t $IMAGE_PREFIX-moderate:latest services/moderate
          docker push $IMAGE_PREFIX-moderate:latest

      - name: Azure login (Managed Identity)
        run: |
          az login --identity
          if [ -n "${{ secrets.AZURE_SUBSCRIPTION_ID }}" ]; then
            az account set --subscription "${{ secrets.AZURE_SUBSCRIPTION_ID }}"
          fi

      - name: Get Kong public IP and FQDN (for OIDC base URL)
        id: kong-ip
        run: |
          KONG_IP=$(az network public-ip list -g jokes-rg --query "[?contains(name,'kong')].ipAddress" -o tsv | head -1)
          KONG_PIP_NAME=$(az network public-ip list -g jokes-rg --query "[?contains(name,'kong')].name" -o tsv | head -1)
          KONG_FQDN=$(az network public-ip show -g jokes-rg -n "$KONG_PIP_NAME" --query "dnsSettings.fqdn" -o tsv 2>/dev/null || true)
          echo "ip=${KONG_IP}" >> $GITHUB_OUTPUT
          echo "fqdn=${KONG_FQDN}" >> $GITHUB_OUTPUT
          echo "Kong public IP: ${KONG_IP}, FQDN: ${KONG_FQDN}"

      - name: Update Kong VM (compose + kong.yml; use Nginx+LE compose if certs exist so 8443 stays TLS)
        run: |
          BASE="https://raw.githubusercontent.com/${{ github.repository }}/main"
          KONG_YML_URL="$BASE/gateway/kong-azure.example.yml"
          # When certs exist: use nginx-in-front compose so 8443 is nginx TLS (avoids Kong default-cert bug)
          KONG_SCRIPT="cd /home/azureuser/kong && if [ -f certs/cert.pem ]; then curl -sL -o docker-compose.yml \"$BASE/deploy/kong/docker-compose-le-nginx.yml\" && curl -sL -o nginx-ssl.conf \"$BASE/deploy/kong/nginx-ssl.conf\"; else curl -sL -o docker-compose.yml \"$BASE/deploy/kong/docker-compose.yml\"; fi && curl -sL -o kong.yml '$KONG_YML_URL' && docker compose up -d"
          echo "=== Kong VM (update compose + restart) ==="
          for i in 1 2 3 4 5; do
            if az vm run-command invoke -g jokes-rg -n jokes-kong-vm --command-id RunShellScript --scripts "$KONG_SCRIPT"; then
              echo "Kong VM update succeeded (attempt $i)"
              break
            fi
            if [ $i -lt 5 ]; then
              echo "Run command conflict or failed (attempt $i), waiting 90s before retry..."
              sleep 90
            else
              echo "Kong VM update failed after 5 attempts (continuing anyway)"
              true
            fi
          done
          # Ensure Kong is actually running (it sometimes stays "Created" after compose up -d)
          echo "=== Kong VM (ensure Kong container is up) ==="
          az vm run-command invoke -g jokes-rg -n jokes-kong-vm --command-id RunShellScript --scripts 'cd /home/azureuser/kong && sleep 8 && docker compose up -d && sleep 5 && docker ps -a && curl -s -o /dev/null -w "Kong: %{http_code}\n" http://localhost:8000/app/joke || true'

      - name: Trigger redeploy on app VMs
        env:
          KONG_IP: ${{ steps.kong-ip.outputs.ip }}
          KONG_FQDN: ${{ steps.kong-ip.outputs.fqdn }}
          OIDC_ISSUER_BASE_URL: ${{ secrets.OIDC_ISSUER_BASE_URL }}
          OIDC_CLIENT_ID: ${{ secrets.OIDC_CLIENT_ID }}
          OIDC_CLIENT_SECRET: ${{ secrets.OIDC_CLIENT_SECRET }}
          OIDC_SECRET: ${{ secrets.OIDC_SECRET }}
        run: |
          set +e
          run_one() {
            local label=$1 vm=$2 script=$3 out=$4
            echo "=== $label ==="
            az vm run-command invoke -g jokes-rg -n "$vm" --command-id RunShellScript --scripts "$script"
            echo $? > "$out"
          }
          # OIDC: use FQDN + HTTPS when available so callback stays on same origin (fixes "checks.state" error)
          MOD_SCRIPT="cd /home/azureuser/app && git pull || true && export JOKE_IP=10.1.1.4 RABBITMQ_IP=10.0.1.5"
          if [ -n "$KONG_FQDN" ]; then
            MOD_SCRIPT="$MOD_SCRIPT OIDC_BASE_URL=https://${KONG_FQDN}:8443/app/moderate"
          elif [ -n "$KONG_IP" ]; then
            MOD_SCRIPT="$MOD_SCRIPT OIDC_BASE_URL=http://${KONG_IP}/app/moderate"
          fi
          if [ -n "$OIDC_ISSUER_BASE_URL" ]; then
            MOD_SCRIPT="$MOD_SCRIPT OIDC_ISSUER_BASE_URL=$OIDC_ISSUER_BASE_URL OIDC_CLIENT_ID=${OIDC_CLIENT_ID:-moderate-app} OIDC_CLIENT_SECRET=${OIDC_CLIENT_SECRET:-} OIDC_SECRET=${OIDC_SECRET:-}"
          fi
          MOD_SCRIPT="$MOD_SCRIPT && cd /home/azureuser/app/deploy/moderate && docker compose up -d --build"
          SUB_SCRIPT='cd /home/azureuser/app && git pull || true && cd /home/azureuser/app/deploy/submit && JOKE_IP=10.1.1.4 RABBITMQ_IP=10.0.1.5 docker compose up -d --build'
          JOKE_SCRIPT='cd /home/azureuser/app && git pull && cd /home/azureuser/app/deploy/joke && RABBITMQ_IP=10.0.1.5 docker compose up -d --build'
          (run_one "Moderate VM" "jokes-moderate-vm" "$MOD_SCRIPT" /tmp/moderate.exit) &
          (run_one "Submit VM" "jokes-submit-vm" "$SUB_SCRIPT" /tmp/submit.exit) &
          (run_one "Joke VM" "jokes-joke-vm" "$JOKE_SCRIPT" /tmp/joke.exit) &
          wait
          moderate=$(cat /tmp/moderate.exit); submit=$(cat /tmp/submit.exit); joke=$(cat /tmp/joke.exit)
          echo "Exit codes: joke=$joke moderate=$moderate submit=$submit"
          exit $(( joke | moderate | submit ))

