# Joke VM – MySQL + joke + ETL. RABBITMQ_IP set by Terraform.
services:
  mysql:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: jokedb
      MYSQL_USER: jokeuser
      MYSQL_PASSWORD: jokepass
    volumes:
      - mysql_vol:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  joke:
    build: ../../services/joke
    image: distributed-jokes-joke:latest
    environment:
      PORT: 3000
      DB_TYPE: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: jokeuser
      DB_PASSWORD: jokepass
      DB_NAME: jokedb
    ports:
      - "3000:3000"
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

  etl:
    build: ../../services/etl
    image: distributed-jokes-etl:latest
    environment:
      PORT: 3001
      DB_TYPE: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: jokeuser
      DB_PASSWORD: jokepass
      DB_NAME: jokedb
      RABBITMQ_URL: amqp://guest:guest@${RABBITMQ_IP:-10.0.1.5}:5672
      MODERATED_QUEUE: moderated
      TYPE_UPDATE_EXCHANGE: type_update
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

volumes:
  mysql_vol:
