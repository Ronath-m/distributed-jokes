# Moderate VM. JOKE_IP, RABBITMQ_IP from Terraform/CD. OIDC_* from CD (GitHub Secrets) when using Azure OIDC.
services:
  moderate:
    build: ../../services/moderate
    image: distributed-jokes-moderate:latest
    environment:
      PORT: 3100
      JOKE_SERVICE_URL: http://${JOKE_IP}:3000
      RABBITMQ_URL: amqp://guest:guest@${RABBITMQ_IP}:5672
      SUBMIT_QUEUE: submit
      MODERATED_QUEUE: moderated
      TYPES_CACHE_PATH: /data/types.json
      TYPE_UPDATE_EXCHANGE: type_update
      MOD_TYPE_UPDATE_QUEUE: mod_type_update
      # OIDC (Azure): set by CD workflow from Kong public IP + GitHub Secrets (OIDC_CLIENT_SECRET, OIDC_SECRET)
      OIDC_ISSUER_BASE_URL: ${OIDC_ISSUER_BASE_URL:-}
      OIDC_BASE_URL: ${OIDC_BASE_URL:-}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-moderate-app}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:-}
      OIDC_SECRET: ${OIDC_SECRET:-}
    ports:
      - "3100:3100"
    volumes:
      - moderate_vol:/data
    restart: unless-stopped

volumes:
  moderate_vol:
