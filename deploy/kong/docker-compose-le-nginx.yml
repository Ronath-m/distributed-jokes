# Kong + Nginx: Nginx does TLS with Let's Encrypt (works around Kong issue #8740).
# Cert at ./certs/cert.pem and cert.key. Nginx listens 80/8443 and proxies to Kong.
services:
  kong:
    image: kong:3.4
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /kong/kong.yml
      KONG_PROXY_LISTEN: "0.0.0.0:8000"
      KONG_ADMIN_LISTEN: "0.0.0.0:8444"
    expose:
      - "8000"
    volumes:
      - ./kong.yml:/kong/kong.yml:ro
    restart: unless-stopped
    networks:
      - kongnet

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "8443:443"
    volumes:
      - ./certs:/etc/nginx/certs:ro
      - ./nginx-ssl.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - kong
    restart: unless-stopped
    networks:
      - kongnet

networks:
  kongnet:
    driver: bridge
