# Kong VM – gateway only. OIDC via hosted IdP (Auth0); see docs/OIDC_AUTH0_AZURE.md.
services:
  kong:
    image: kong:3.4
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /kong/kong.yml
      KONG_PROXY_LISTEN: "0.0.0.0:8000"
      KONG_ADMIN_LISTEN: "0.0.0.0:8444"
    ports:
      - "80:8000"
      - "8443:8443"
    volumes:
      - ./kong.yml:/kong/kong.yml:ro
    restart: unless-stopped
