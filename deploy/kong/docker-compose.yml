# Kong VM – gateway only. OIDC via Auth0. TLS on 8443 using Kong's default cert (generated at runtime on VM).
services:
  kong:
    image: kong:3.4
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /kong/kong.yml
      KONG_PROXY_LISTEN: "0.0.0.0:8000, 0.0.0.0:8443 ssl"
      KONG_ADMIN_LISTEN: "0.0.0.0:8444"
    ports:
      - "80:8000"
      - "8443:8443"
    volumes:
      - ./kong.yml:/kong/kong.yml:ro
    restart: unless-stopped
