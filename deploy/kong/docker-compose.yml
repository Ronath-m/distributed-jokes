# Kong VM – gateway only. OIDC via Auth0. TLS on 8443 (cert on VM, see docs/TLS_AZURE.md).
services:
  kong:
    image: kong:3.4
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /kong/kong.yml
      KONG_PROXY_LISTEN: "0.0.0.0:8000, 0.0.0.0:8443 ssl"
      KONG_ADMIN_LISTEN: "0.0.0.0:8444"
      # TLS: cert on VM (generated by CD or setup script), not in image
      KONG_SSL_CERT: "/kong/certs/cert.pem"
      KONG_SSL_CERT_KEY: "/kong/certs/cert.key"
    ports:
      - "80:8000"
      - "8443:8443"
    volumes:
      - ./kong.yml:/kong/kong.yml:ro
      - ./certs:/kong/certs:ro
    restart: unless-stopped
