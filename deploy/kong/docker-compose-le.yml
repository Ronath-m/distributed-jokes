# Kong with Let's Encrypt cert (used when kong_domain_name_label + certbot_email set in Terraform).
# Cert at ./certs/cert.pem and cert.key (created by certbot on VM).
services:
  kong:
    image: kong:3.4
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /kong/kong.yml
      KONG_PROXY_LISTEN: "0.0.0.0:8000, 0.0.0.0:8443 ssl"
      KONG_ADMIN_LISTEN: "0.0.0.0:8444"
      KONG_NGINX_PROXY_SSL_CERTIFICATE: "/kong/certs/cert.pem"
      KONG_NGINX_PROXY_SSL_CERTIFICATE_KEY: "/kong/certs/cert.key"
    ports:
      - "80:8000"
      - "8443:8443"
    volumes:
      - ./kong.yml:/kong/kong.yml:ro
      - ./certs:/kong/certs:ro
    restart: unless-stopped
