# Local full stack (Phase 3–7). Single origin via Kong: http://localhost
# Run from project root: docker compose up -d
# UIs: http://localhost/app/joke, http://localhost/app/submit, http://localhost/app/moderate
# Default DB: MySQL. Optional OIDC: set OIDC_* in .env and use moderator at http://localhost:4100 (see docs/OIDC_SETUP.md).

networks:
  app_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/24

volumes:
  mysql_vol:
  mongo_vol:
  rabbitmq_vol:
  submit_vol:
  moderate_vol:

services:
  mysql:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: jokedb
      MYSQL_USER: jokeuser
      MYSQL_PASSWORD: jokepass
    volumes:
      - mysql_vol:/var/lib/mysql
    networks:
      app_network:
        ipv4_address: 172.28.0.10
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

  mongo:
    image: mongo:7
    volumes:
      - mongo_vol:/data/db
    networks:
      app_network:
        ipv4_address: 172.28.0.12
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_vol:/var/lib/rabbitmq
    networks:
      app_network:
        ipv4_address: 172.28.0.11
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 5s
      timeout: 5s
      retries: 10

  joke:
    build: ./services/joke
    environment:
      PORT: 3000
      DB_TYPE: ${DB_TYPE:-mysql}
      DB_HOST: 172.28.0.10
      DB_PORT: 3306
      DB_USER: jokeuser
      DB_PASSWORD: jokepass
      DB_NAME: jokedb
      MONGO_URI: ${MONGO_URI:-mongodb://172.28.0.12:27017/jokedb}
    ports:
      - "4000:3000"
    networks:
      app_network:
        ipv4_address: 172.28.0.20
    depends_on:
      mysql: { condition: service_healthy }
      mongo: { condition: service_healthy }

  etl:
    build: ./services/etl
    environment:
      PORT: 3001
      DB_TYPE: ${DB_TYPE:-mysql}
      DB_HOST: 172.28.0.10
      DB_PORT: 3306
      DB_USER: jokeuser
      DB_PASSWORD: jokepass
      DB_NAME: jokedb
      MONGO_URI: ${MONGO_URI:-mongodb://172.28.0.12:27017/jokedb}
      RABBITMQ_URL: amqp://guest:guest@172.28.0.11:5672
      MODERATED_QUEUE: moderated
      TYPE_UPDATE_EXCHANGE: type_update
    networks:
      app_network: {}
    depends_on:
      mysql: { condition: service_healthy }
      mongo: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }

  submit:
    build: ./services/submit
    environment:
      PORT: 3200
      JOKE_SERVICE_URL: http://172.28.0.20:3000
      RABBITMQ_URL: amqp://guest:guest@172.28.0.11:5672
      SUBMIT_QUEUE: submit
      TYPES_CACHE_PATH: /data/types.json
      TYPE_UPDATE_EXCHANGE: type_update
      SUB_TYPE_UPDATE_QUEUE: sub_type_update
    ports:
      - "4200:3200"
    volumes:
      - submit_vol:/data
    networks:
      app_network:
        ipv4_address: 172.28.0.22
    depends_on:
      rabbitmq: { condition: service_healthy }

  moderate:
    build: ./services/moderate
    extra_hosts:
      - "host.docker.internal:host-gateway"
      # So the container can reach Keycloak at localhost:8080 (issuer URL used in redirects so browser works)
      - "localhost:host-gateway"
    environment:
      PORT: 3100
      JOKE_SERVICE_URL: http://172.28.0.20:3000
      RABBITMQ_URL: amqp://guest:guest@172.28.0.11:5672
      SUBMIT_QUEUE: submit
      MODERATED_QUEUE: moderated
      TYPES_CACHE_PATH: /data/types.json
      TYPE_UPDATE_EXCHANGE: type_update
      MOD_TYPE_UPDATE_QUEUE: mod_type_update
      # Optional OIDC (Phase 7). Set in .env to enable; then run with: docker compose --profile oidc up -d
      OIDC_ISSUER_BASE_URL: ${OIDC_ISSUER_BASE_URL:-}
      OIDC_ISSUER_INTERNAL_URL: ${OIDC_ISSUER_INTERNAL_URL:-}
      OIDC_BASE_URL: ${OIDC_BASE_URL:-}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:-}
      OIDC_SECRET: ${OIDC_SECRET:-}
    ports:
      - "4100:3100"
    volumes:
      - moderate_vol:/data
    networks:
      app_network:
        ipv4_address: 172.28.0.23
    depends_on:
      rabbitmq: { condition: service_healthy }

  keycloak:
    image: quay.io/keycloak/keycloak:latest
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HTTP_PORT: 8080
    command: start-dev
    ports:
      - "8080:8080"
    networks:
      app_network: {}
    profiles:
      - oidc

  kong:
    image: kong:3.4
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /kong/kong.yml
      KONG_PROXY_LISTEN: "0.0.0.0:8000"
      KONG_ADMIN_LISTEN: "0.0.0.0:8444"
    ports:
      - "80:8000"
    volumes:
      - ./gateway/kong.yml:/kong/kong.yml:ro
    networks:
      app_network: {}
    depends_on:
      - joke
      - submit
      - moderate
