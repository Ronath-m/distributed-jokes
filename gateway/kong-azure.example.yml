# Kong config for Azure (Phase 6). Use private IPs from: terraform output private_ips
# Copy to Kong VM as kong.yml. Joke=10.1.1.4, Moderate=10.2.1.4, Submit=10.2.1.5
_format_version: "3.0"
_transform: true

services:
  - name: joke-service
    url: http://10.1.1.4:3000
    routes:
      - name: joke-ui
        paths: [ /app/joke ]
        strip_path: true
      - name: joke-api
        paths: [ /joke, /joke/ ]
        strip_path: false
        plugins:
          - name: rate-limiting
            config: { minute: 5, policy: local }
      - name: types-route
        paths: [ /types ]
        strip_path: false

  - name: submit-service
    url: http://10.2.1.5:3200
    routes:
      - name: submit-ui
        paths: [ /app/submit ]
        strip_path: true
      - name: submit-api
        paths: [ /submit ]
        strip_path: false
      - name: submit-types
        paths: [ /submit/types ]
        strip_path: false
      - name: submit-docs
        paths: [ /docs ]
        strip_path: false

  - name: moderate-service
    url: http://10.2.1.4:3100
    routes:
      - name: moderate-ui
        paths:
          - /app/moderate
          - /app/moderate/
          - /app/moderate/callback
          - /app/moderate/login
          - /app/moderate/logout
        strip_path: true
      - name: moderate-api
        paths: [ /moderate, /moderated, /moderate/types ]
        strip_path: false
