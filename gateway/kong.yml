# Kong declarative config (DB-less). Single origin. UIs: /app/joke, /app/submit, /app/moderate.
# APIs: /joke, /types, /submit, /submit/types, /moderate, /moderated, /moderate/types, /docs.
_format_version: "3.0"
_transform: true

services:
  - name: joke-service
    url: http://172.28.0.20:3000
    routes:
      - name: joke-ui
        paths:
          - /app/joke
        strip_path: true
      - name: joke-api
        paths:
          - /joke
          - /joke/
        strip_path: false
        plugins:
          - name: rate-limiting
            config:
              minute: 5
              policy: local
      - name: types-route
        paths:
          - /types
        strip_path: false

  - name: submit-service
    url: http://172.28.0.22:3200
    routes:
      - name: submit-ui
        paths:
          - /app/submit
        strip_path: true
      - name: submit-api
        paths:
          - /submit
        strip_path: false
      - name: submit-types
        paths:
          - /submit/types
        strip_path: false
      - name: submit-docs
        paths:
          - /docs
        strip_path: false

  - name: moderate-service
    url: http://172.28.0.23:3100
    routes:
      - name: moderate-ui
        paths:
          - /app/moderate
        strip_path: true
      - name: moderate-api
        paths:
          - /moderate
          - /moderated
          - /moderate/types
        strip_path: false
